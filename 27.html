<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>時間感知與注意力挑戰</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f0f4f8; display: flex; justify-content: center; padding: 20px; }
        #quiz-container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 600px; width: 100%; }
        h1 { color: #1a73e8; text-align: center; margin-bottom: 20px; }
        .setting-group { background: #f8f9fa; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #eef; }
        label { font-weight: bold; display: block; margin-bottom: 8px; color: #444; }
        select, input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 10px; box-sizing: border-box; }
        
        #timer-wrapper { width: 100%; height: 12px; background: #eee; border-radius: 6px; margin-bottom: 20px; overflow: hidden; display: none; }
        #timer-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #34a853, #fbbc05, #ea4335); transition: width 0.1s linear; }
        
        .question { font-size: 1.3rem; margin-bottom: 20px; font-weight: bold; color: #222; }
        .options { display: grid; gap: 10px; }
        button.opt-btn { padding: 15px; font-size: 1rem; cursor: pointer; border: 2px solid #eee; border-radius: 10px; background: #fff; text-align: left; transition: 0.2s; }
        button.opt-btn:hover:not(:disabled) { border-color: #1a73e8; background: #f0f7ff; }
        
        .correct { background: #d4edda !important; border-color: #28a745 !important; color: #155724; }
        .wrong { background: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
        
        /* 這裡稍微修改了按鈕樣式 */
        #main-btn, #next-q-btn { background: #1a73e8; color: white; border: none; padding: 16px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; font-size: 1.1rem; margin-top: 20px; }
        #next-q-btn { background: #ff9800; } /* 下一題按鈕改為橙色，更好辨認 */
        #main-btn:hover { background: #1557b0; }
        #next-q-btn:hover { background: #e68a00; }
        
        #info-bar { display: flex; justify-content: space-between; margin-bottom: 10px; color: #666; font-weight: bold; }
        .timeout-msg { color: #ea4335; font-size: 1.5rem; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="setup-box">
        <h1>⚙️ 測驗設定</h1>
        <div class="setting-group">
            <label>1. 選擇總題數：</label>
            <select id="total-q">
                <option value="5">5 題</option>
                <option value="10" selected>10 題</option>
                <option value="20">20 題</option>
                <option value="50">全部 50 題</option>
            </select>
        </div>
        <div class="setting-group">
            <label>2. 時間模式：</label>
            <select id="time-mode" onchange="toggleTimeMode()">
                <option value="total">總共限時 (時間到自動結算)</option>
                <option value="per-q">每題限時 (適合衝刺)</option>
                <option value="none">不限時間</option>
            </select>
            <div id="time-val-box">
                <label id="time-label">總共秒數：</label>
                <input type="number" id="time-input" value="60" min="1">
            </div>
        </div>
        <button id="main-btn" onclick="startGame()">開始測驗</button>
    </div>

    <div id="quiz-box" style="display:none;">
        <div id="info-bar">
            <span id="progress-text"></span>
            <span id="timer-text"></span>
        </div>
        <div id="timer-wrapper"><div id="timer-bar"></div></div>
        <div class="question" id="question-text"></div>
        <div class="options" id="option-container"></div>
        <div id="result-msg" style="text-align:center; margin-top:20px; font-weight:bold; min-height:1.2em;"></div>
        <button id="next-q-btn" style="display:none;" onclick="nextQuestion()">下一題</button>
    </div>

    <div id="final-box" style="display:none; text-align:center;">
        <div id="timeout-status" class="timeout-msg" style="display:none;">⏰ 時間結束！</div>
        <h1 id="final-title">測驗完成</h1>
        <p id="final-score-text" style="font-size: 1.2rem; margin-top: 10px;">你在限時內答對了：</p>
        <p id="final-score" style="font-size: 3.5rem; color: #1a73e8; font-weight: bold; margin: 5px 0;"></p>
        <p id="final-msg"></p>
        <button id="main-btn" onclick="location.reload()">重新挑戰</button>
    </div>
</div>

<script>
    const allQuestions = [
        {"q": "1. 人類是如何感覺時間的?", "o": ["A. 透過心跳", "B. 透過眼睛", "C. 大腦推算", "D. 天生內建時鐘"], "a": "C"},

        {"q": "4. 為什麼滑手機常常不知不覺過很久?", "o": ["A. 手會累", "B. 光線影響", "C. 重複刺激", "D. 螢幕太小"], "a": "C"},
        {"q": "5. 夾紅豆這類動作會影響哪一種能力?", "o": ["A. 記憶力", "B. 時間判斷", "C. 視力", "D. 聽力"], "a": "B"},
        {"q": "6. 人一天平均眨眼幾次？", "o": ["A. 約 100 次", "B. 約 500 次", "C. 約 1,000 次", "D. 超過 10,000 次"], "a": "D"},
        {"q": "7. 為什麼我們不會感覺到自己眨眼？", "o": ["A. 太快", "B. 大腦補畫面", "C. 眼睛關太緊", "D. 習慣了"], "a": "B"},

    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let timerInterval;
    let timeMode, timeLimitValue, totalSecondsLeft;

    function toggleTimeMode() {
        const mode = document.getElementById('time-mode').value;
        const box = document.getElementById('time-val-box');
        const label = document.getElementById('time-label');
        const input = document.getElementById('time-input');
        
        box.style.display = (mode === 'none') ? 'none' : 'block';
        if (mode === 'per-q') {
            label.innerText = "每題秒數：";
            input.value = 10;
        } else
