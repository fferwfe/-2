<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>時間感知與注意力挑戰</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        #quiz-container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #1a73e8;
            text-align: center;
            margin-bottom: 20px;
        }
        .setting-group {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid #eef;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
            color: #444;
        }
        input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 10px;
            box-sizing: border-box;
            background: #f2f2f2;
            color: #666;
        }

        #timer-wrapper {
            width: 100%;
            height: 12px;
            background: #eee;
            border-radius: 6px;
            margin-bottom: 20px;
            overflow: hidden;
            display: block;
        }
        #timer-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #34a853, #fbbc05, #ea4335);
            transition: width 0.1s linear;
        }

        .question {
            font-size: 1.3rem;
            margin-bottom: 20px;
            font-weight: bold;
            color: #222;
            line-height: 1.6;
        }
        .options {
            display: grid;
            gap: 10px;
        }
        button.opt-btn {
            padding: 15px;
            font-size: 1rem;
            cursor: pointer;
            border: 2px solid #eee;
            border-radius: 10px;
            background: #fff;
            text-align: left;
            transition: 0.2s;
        }
        button.opt-btn:hover:not(:disabled) {
            border-color: #1a73e8;
            background: #f0f7ff;
        }
        button.opt-btn:disabled {
            cursor: default;
        }

        .correct {
            background: #d4edda !important;
            border-color: #28a745 !important;
            color: #155724;
        }
        .wrong {
            background: #f8d7da !important;
            border-color: #dc3545 !important;
            color: #721c24;
        }

        #main-btn, #next-q-btn, #restart-btn {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            font-size: 1.1rem;
            margin-top: 20px;
        }
        #next-q-btn {
            background: #ff9800;
        }
        #main-btn:hover, #restart-btn:hover {
            background: #1557b0;
        }
        #next-q-btn:hover {
            background: #e68a00;
        }

        #info-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: #666;
            font-weight: bold;
            gap: 12px;
            flex-wrap: wrap;
        }
        .timeout-msg {
            color: #ea4335;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        .fixed-note {
            text-align: center;
            color: #666;
            font-size: 0.95rem;
            margin-top: -5px;
        }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="setup-box">
        <h1>⚙️ 測驗設定</h1>
        <div class="setting-group">
            <label>題數：</label>
            <input type="text" value="固定 50 題" readonly>
        </div>
        <div class="setting-group">
            <label>時間模式：</label>
            <input type="text" value="總共限時" readonly>
            <label>總共秒數：</label>
            <input type="text" value="300 秒" readonly>
        </div>
        <div class="fixed-note">本測驗已固定為 50 題／300 秒</div>
        <button id="main-btn" onclick="startGame()">開始測驗</button>
    </div>

    <div id="quiz-box" style="display:none;">
        <div id="info-bar">
            <span id="progress-text"></span>
            <span id="timer-text"></span>
        </div>
        <div id="timer-wrapper"><div id="timer-bar"></div></div>
        <div class="question" id="question-text"></div>
        <div class="options" id="option-container"></div>
        <div id="result-msg" style="text-align:center; margin-top:20px; font-weight:bold; min-height:1.2em;"></div>
        <button id="next-q-btn" style="display:none;" onclick="nextQuestion()">下一題</button>
    </div>

    <div id="final-box" style="display:none; text-align:center;">
        <div id="timeout-status" class="timeout-msg" style="display:none;">⏰ 時間結束！</div>
        <h1 id="final-title">測驗完成</h1>
        <p id="final-score-text" style="font-size: 1.2rem; margin-top: 10px;">你總共答對了：</p>
        <p id="final-score" style="font-size: 3.5rem; color: #1a73e8; font-weight: bold; margin: 5px 0;"></p>
        <p id="final-msg"></p>
        <button id="restart-btn" onclick="location.reload()">重新挑戰</button>
    </div>
</div>

<script>
    const allQuestions = [
        {"q": "1. 人類是如何感覺時間的?", "o": ["A. 透過心跳", "B. 透過眼睛", "C. 大腦推算", "D. 天生內建時鐘"], "a": "C"},
        {"q": "2. 哪種情況最容易覺得時間過很快?", "o": ["A. 等公車", "B. 專心玩遊戲", "C. 發呆", "D. 看時鐘"], "a": "B"},
        {"q": "3. 一心多用時，大腦實際上在做什麼？", "o": ["A. 同時處理", "B. 忽略其中一件", "C. 快速切換", "D. 自動加速"], "a": "C"},
        {"q": "4. 為什麼滑手機常常不知不覺過很久?", "o": ["A. 手會累", "B. 光線影響", "C. 重複刺激", "D. 螢幕太小"], "a": "C"},
        {"q": "5. 夾紅豆這類動作會影響哪一種能力?", "o": ["A. 記憶力", "B. 時間判斷", "C. 視力", "D. 聽力"], "a": "B"},
        {"q": "6. 人一天平均眨眼幾次？", "o": ["A. 約 100 次", "B. 約 500 次", "C. 約 1,000 次", "D. 超過 10,000 次"], "a": "D"},
        {"q": "7. 為什麼我們不會感覺到自己眨眼？", "o": ["A. 太快", "B. 大腦補畫面", "C. 眼睛關太緊", "D. 習慣了"], "a": "B"},
        {"q": "8. 站著等人通常會覺得？", "o": ["A. 比較快", "B. 比較慢", "C. 沒差", "D. 看心情"], "a": "B"},
        {"q": "9. 人對時間最不準確的時候是？", "o": ["A. 放鬆", "B. 專心", "C. 緊張", "D. 睡前"], "a": "C"},
        {"q": "10. 以下哪個會讓時間感覺變慢？", "o": ["A. 玩遊戲", "B. 聽音樂", "C. 等待", "D. 聊天"], "a": "C"},
        {"q": "11. 熱的食物聞起來比較香，主要原因是？", "o": ["A. 顏色", "B. 油脂", "C. 分子擴轉快", "D. 心理作用"], "a": "C"},
        {"q": "12. 為什麼考試時時間過特別快？", "o": ["A. 題目少", "B. 專注度高", "C. 太緊張", "D. 鐘壞了"], "a": "B"},
        {"q": "13. 人類其實最不擅長的是？", "o": ["A. 記臉", "B. 多工處理", "C. 語言", "D. 運動"], "a": "B"},
        {"q": "14. 哪個行為最容易讓人低估時間？", "o": ["A. 數秒", "B. 看鐘", "C. 做手部動作", "D. 發呆"], "a": "C"},
        {"q": "15. 背景音樂會影響時間感，主要影響的是？", "o": ["A. 記憶力", "B. 注意力分配", "C. 聽力", "D. 視力"], "a": "B"},
        {"q": "16. 當你覺得時間過得很慢時，通常是因為？", "o": ["A. 沒事做", "B. 正在專心", "C. 很快樂", "D. 正在睡覺"], "a": "A"},
        {"q": "17. 哪種情緒會讓時間感「變慢」？", "o": ["A. 快樂", "B. 恐懼", "C. 平靜", "D. 興奮"], "a": "B"},
        {"q": "18. 「望梅止渴」主要影響的是？", "o": ["A. 聽覺", "B. 視覺", "C. 想像力", "D. 觸覺"], "a": "B"},
        {"q": "19. 人在什麼情況下最容易產生「時間錯覺」？", "o": ["A. 專注時", "B. 睡覺時", "C. 運動時", "D. 聊天時"], "a": "A"},
        {"q": "20. 大腦處理資訊量增加時，時間感會？", "o": ["A. 變快", "B. 變慢", "C. 不變", "D. 消失"], "a": "B"},
        {"q": "21. 當你感到無聊時，大腦會？", "o": ["A. 停止運作", "B. 尋找刺激", "C. 變得很準確", "D. 進入睡眠"], "a": "B"},
        {"q": "22. 哪種顏色通常會讓人覺得時間過得比較慢？", "o": ["A. 紅色", "B. 藍色", "C. 綠色", "D. 黃色"], "a": "A"},
        {"q": "23. 「心流」狀態下，時間感會？", "o": ["A. 變慢", "B. 變快", "C. 消失", "D. 變準確"], "a": "B"},
        {"q": "24. 人在什麼年齡層通常覺得時間過得最快？", "o": ["A. 幼兒", "B. 青少年", "C. 中年", "D. 老年"], "a": "D"},
        {"q": "25. 為什麼小時候覺得一年很長？", "o": ["A. 記憶點多", "B. 沒事做", "C. 動作慢", "D. 睡得多"], "a": "A"},
        {"q": "26. 哪種情況會讓人覺得時間過得特別快？", "o": ["A. 等公車", "B. 玩遊戲", "C. 上無聊的課", "D. 生病時"], "a": "B"},
        {"q": "27. 「注意力不集中」會導致時間感？", "o": ["A. 變快", "B. 變慢", "C. 變準確", "D. 消失"], "a": "A"},
        {"q": "28. 人在壓力大時，時間感通常會？", "o": ["A. 變快", "B. 變慢", "C. 不變", "D. 消失"], "a": "B"},
        {"q": "29. 「多工處理」對時間判斷的影響是？", "o": ["A. 變得更準確", "B. 變得不準確", "C. 沒有影響", "D. 縮短感知時間"], "a": "B"},
        {"q": "30. 哪種感官對時間的感知最敏銳？", "o": ["A. 視覺", "B. 聽覺", "C. 觸覺", "D. 嗅覺"], "a": "B"},
        {"q": "31. 哪種情緒會讓人覺得時間過得特別慢？", "o": ["A. 快樂", "B. 恐懼", "C. 興奮", "D. 放鬆"], "a": "B"},
        {"q": "32. 「眨眼」會導致短暫的時間感？", "o": ["A. 變快", "B. 變慢", "C. 消失", "D. 變準確"], "a": "B"},
        {"q": "33. 人在運動時，時間感通常會？", "o": ["A. 變快", "B. 變慢", "C. 不變", "D. 消失"], "a": "B"},
        {"q": "34. 「咖啡因」對時間感知的影響是？", "o": ["A. 覺得時間變慢", "B. 覺得時間變快", "C. 沒有影響", "D. 變得更準確"], "a": "B"},
        {"q": "35. 哪種環境會讓人覺得時間過得比較快？", "o": ["A. 吵雜的環境", "B. 安靜的環境", "C. 熟悉的環境", "D. 陌生的環境"], "a": "C"},
        {"q": "36. 以下哪個是時間判斷的常見錯誤？", "o": ["A. 高估", "B. 低估", "C. 忽略", "D. 以上皆是"], "a": "D"},
        {"q": "37. 人類對時間的感覺屬於？", "o": ["A. 客觀", "B. 固定", "C. 主觀", "D. 精準"], "a": "C"},
        {"q": "38. 哪個最容易讓人忘記時間？", "o": ["A. 等人", "B. 專注創作", "C. 看鐘", "D. 無聊"], "a": "B"},
        {"q": "39. 為什麼上課最後 5 分鐘特別漫長？", "o": ["A. 疲勞", "B. 想下課", "C. 注意時間", "D. 以上皆是"], "a": "D"},
        {"q": "40. 哪一項能幫助時間判斷更準？", "o": ["A. 分心", "B. 多工", "C. 外在提示", "D. 疲勞"], "a": "C"},
        {"q": "41. 人最容易分心的時候是？", "o": ["A. 精神好", "B. 疲累", "C. 運動後", "D. 剛睡醒"], "a": "B"},
        {"q": "42. 以下哪個與時間錯覺無關？", "o": ["A. 專注", "B. 情緒", "C. 注意力", "D. 血型"], "a": "D"},
        {"q": "43. 為什麼無聊時特別想看時間？", "o": ["A. 想確認", "B. 大腦專注", "C. 習慣", "D. 太安靜"], "a": "B"},
        {"q": "44. 哪個會讓時間感覺變慢？", "o": ["A. 緊張", "B. 投入", "C. 專心", "D. 興奮"], "a": "A"},
        {"q": "45. 哪一種情境最容易產生錯覺？", "o": ["A. 單調", "B. 熟悉", "C. 重複", "D. 以上皆是"], "a": "D"},
        {"q": "46. 為什麼做實驗時要控制變因？", "o": ["A. 比較快", "B. 比較準", "C. 比較簡單", "D. 比較好玩"], "a": "B"},
        {"q": "47. 人類注意力被打斷後，恢復需要？", "o": ["A. 馬上", "B. 幾秒", "C. 一段時間", "D. 不會恢復"], "a": "C"},
        {"q": "48. 以下哪個最符合大腦實際運作？", "o": ["A. 永遠專注", "B. 容易分心", "C. 不會疲勞", "D. 完全理性"], "a": "B"},
        {"q": "49. 為什麼重複動作會讓人放空？", "o": ["A. 無聊", "B. 大腦省力", "C. 肌肉記憶", "D. 太累"], "a": "B"},
        {"q": "50. 這個闖關活動主要在測什麼？", "o": ["A. 手眼協調", "B. 記憶力", "C. 時間感知", "D. 反應速度"], "a": "C"}
    ];

    const TOTAL_QUESTIONS = 50;
    const TOTAL_TIME = 300;

    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let timerInterval = null;
    let totalSecondsLeft = TOTAL_TIME;
    let answered = false;

    function shuffleArray(arr) {
        const newArr = [...arr];
        for (let i = newArr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
        }
        return newArr;
    }

    function startGame() {
        currentQuestions = shuffleArray(allQuestions).slice(0, TOTAL_QUESTIONS);
        currentIndex = 0;
        score = 0;
        answered = false;
        totalSecondsLeft = TOTAL_TIME;

        document.getElementById('setup-box').style.display = 'none';
        document.getElementById('final-box').style.display = 'none';
        document.getElementById('quiz-box').style.display = 'block';
        document.getElementById('timeout-status').style.display = 'none';
        document.getElementById('timer-wrapper').style.display = 'block';

        clearInterval(timerInterval);
        timerInterval = null;

        startTotalTimer();
        showQuestion();
    }

    function startTotalTimer() {
        updateTotalTimerUI();
        timerInterval = setInterval(() => {
            totalSecondsLeft--;
            updateTotalTimerUI();

            if (totalSecondsLeft <= 0) {
                clearInterval(timerInterval);
                timerInterval = null;
                endGame(true);
            }
        }, 1000);
    }

    function updateTotalTimerUI() {
        const timerText = document.getElementById('timer-text');
        const timerBar = document.getElementById('timer-bar');

        timerText.innerText = `剩餘 ${totalSecondsLeft} 秒`;

        const percent = Math.max((totalSecondsLeft / TOTAL_TIME) * 100, 0);
        timerBar.style.width = percent + '%';
    }

    function showQuestion() {
        answered = false;
        const qObj = currentQuestions[currentIndex];

        document.getElementById('progress-text').innerText = `第 ${currentIndex + 1} / ${currentQuestions.length} 題`;
        document.getElementById('question-text').innerText = qObj.q;
        document.getElementById('result-msg').innerText = '';
        document.getElementById('next-q-btn').style.display = 'none';

        const optionContainer = document.getElementById('option-container');
        optionContainer.innerHTML = '';

        qObj.o.forEach(optionText => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = optionText;
            btn.onclick = () => selectAnswer(btn, optionText);
            optionContainer.appendChild(btn);
        });
    }

    function selectAnswer(clickedBtn, optionText) {
        if (answered) return;
        answered = true;

        const qObj = currentQuestions[currentIndex];
        const correctLetter = qObj.a;
        const buttons = document.querySelectorAll('.opt-btn');

        buttons.forEach(btn => {
            btn.disabled = true;
            const btnLetter = btn.innerText.trim().charAt(0);
            if (btnLetter === correctLetter) {
                btn.classList.add('correct');
            }
        });

        const selectedLetter = optionText.trim().charAt(0);

        if (selectedLetter === correctLetter) {
            clickedBtn.classList.add('correct');
            score++;
            document.getElementById('result-msg').innerText = '✅ 答對了！';
            document.getElementById('result-msg').style.color = '#28a745';
        } else {
            clickedBtn.classList.add('wrong');
            document.getElementById('result-msg').innerText = `❌ 答錯了！正確答案是 ${correctLetter}`;
            document.getElementById('result-msg').style.color = '#dc3545';
        }

        if (currentIndex < currentQuestions.length - 1) {
            document.getElementById('next-q-btn').style.display = 'block';
        } else {
            setTimeout(() => endGame(false), 500);
        }
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex >= currentQuestions.length) {
            endGame(false);
        } else {
            showQuestion();
        }
    }

    function endGame(isTimeout = false) {
        clearInterval(timerInterval);
        timerInterval = null;

        document.getElementById('quiz-box').style.display = 'none';
        document.getElementById('final-box').style.display = 'block';

        if (isTimeout) {
            document.getElementById('timeout-status').style.display = 'block';
            document.getElementById('final-title').innerText = '時間到，測驗結束';
        } else {
            document.getElementById('timeout-status').style.display = 'none';
            document.getElementById('final-title').innerText = '測驗完成';
        }

        document.getElementById('final-score-text').innerText = `你總共答對了 ${currentQuestions.length} 題中的：`;
        document.getElementById('final-score').innerText = `${score} 題`;

        let msg = '';
        const ratio = score / currentQuestions.length;

        if (ratio === 1) {
            msg = '太厲害了！你的時間感知超強！';
        } else if (ratio >= 0.8) {
            msg = '表現很棒！你對時間與注意力很有掌握。';
        } else if (ratio >= 0.6) {
            msg = '不錯喔！再挑戰一次，成績還能更高。';
        } else if (ratio >= 0.4) {
            msg = '有潛力！再多練習一下時間感知吧。';
        } else {
            msg = '別灰心，再挑戰一次試試看！';
        }

        document.getElementById('final-msg').innerText = msg;
    }
</script>

</body>
</html>
